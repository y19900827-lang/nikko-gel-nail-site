<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダンスファッションニッコウ | ジェルネイル</title>
  <link rel="stylesheet" href="styles.css">
  <script src="header-footer.js"></script>
</head>
<body>
<main>
  <section class="page hero">
    <div>
      <p class="badge">初回体験 2,000円</p>
      <h1>ぷっくり艶めく、<br>大人かわいい指先。</h1>
      <p class="lead">明るいピンクと上品なツヤで、毎日を少し特別に。</p>
      <div class="actions">
        <a class="gel-button" href="reserve.html">今すぐ予約する</a>
        <a class="text-link" href="gallery.html">デザインを見る</a>
      </div>
    </div>
    <div class="visual hero-visual">
      <div class="hero-photo-frame">
        <img src="images/hero-nails-plate.png" alt="パール皿に並んだピンクのジェルネイル">
      </div>
      <div class="spark">✦</div>
    </div>
  </section>

  <section class="page grid-3">
    <article class="card menu-card"><span class="icon">◎</span><div><h2>ワンカラー</h2><p class="menu-price">¥5,000</p></div></article>
    <article class="card menu-card"><span class="icon">◇</span><div><h2>複数カラー</h2><p class="menu-price">¥6,000</p></div></article>
    <article class="card menu-card"><span class="icon">✦</span><div><h2>オフケア込み</h2><p class="menu-note">料金込み</p></div></article>
  </section>

  <section class="page grid-2">
    <article class="card">
      <p class="kicker">Concept</p>
      <h2 class="section-title concept-title">大人女性の<br>上品なオシャレ！</h2>
      <p class="body-copy">ぷっくりしたジェルの艶、パールのような柔らかい白、シャンパンゴールドの細いアクセントで、かわいさと上品さを両立します。</p>
    </article>
    <article class="card">
      <p class="kicker">First Visit</p>
      <h2 class="section-title">初めての方は、<br>2,000円で体験</h2>
      <p class="body-copy">色選びやデザインの相談も、予約時に気軽に送れる形にしています。</p>
      <p style="margin-top:28px"><a class="gel-button" href="first.html">詳しく見る</a></p>
    </article>
  </section>
</main>
</body>
</html>
