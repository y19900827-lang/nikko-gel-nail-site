<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>デザイン | ダンスファッションニッコウ</title>
  <link rel="stylesheet" href="styles.css">
  <script src="header-footer.js"></script>
</head>
<body>
<main class="page">
  <p class="kicker">Design</p>
  <h1>デザインギャラリー</h1>
  <p class="lead">実際の仕上がり写真を見ながら、好きな色味や質感を選べます。（他に多数カラーあります）</p>

  <div class="grid-3 photo-gallery" style="margin-top:42px">
    <article class="card photo-card">
      <div class="photo-frame">
        <img src="images/one-color.png" alt="ピンクのワンカラージェルネイル">
      </div>
      <div class="photo-copy">
        <p class="photo-label">ワンカラー</p>
        <h2>艶ピンクの単色</h2>
        <p class="photo-price">¥5,000</p>
        <p class="body-copy">肌なじみのいいピンクで、指先を上品に見せる定番デザイン。</p>
      </div>
    </article>

    <article class="card photo-card">
      <div class="photo-frame">
        <img class="rotate-180" src="images/pink-magnet.png" alt="ピンクマグネットネイル">
      </div>
      <div class="photo-copy">
        <p class="photo-label">マグネットネイル</p>
        <h2>ピンクマグネット</h2>
        <p class="photo-price">¥5,000</p>
        <p class="body-copy">光の角度でふんわり輝く、華やかで大人かわいい質感。</p>
      </div>
    </article>

    <article class="card photo-card">
      <div class="photo-frame">
        <img src="images/multi-color.png" alt="ブルーとグリーンの複数カラージェルネイル">
      </div>
      <div class="photo-copy">
        <p class="photo-label">複数カラー</p>
        <h2>多色マグネット</h2>
        <p class="photo-price">¥6,000</p>
        <p class="body-copy">色を組み合わせて、明るく軽やかな印象に仕上げます。</p>
      </div>
    </article>
  </div>
</main>
</body>
</html>
