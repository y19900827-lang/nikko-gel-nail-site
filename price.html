<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>料金 | ダンスファッションニッコウ</title>
  <meta name="description" content="ジェルネイル料金は初回体験2,000円、単色5,000円、複数色6,000円。写真付きでメニューを確認できます。">
  <link rel="canonical" href="https://nikko-gel-nail-site.vercel.app/price.html">
  <link rel="stylesheet" href="styles.css">
  <script src="header-footer.js"></script>
</head>
<body>
<main class="page">
  <p class="kicker">Price</p>
  <h1>料金</h1>
  <p class="lead">分かりやすい価格で、初めての方も安心して選べます。</p>

  <div class="grid-3" style="margin-top:42px">
    <article class="card" style="text-align:center"><p class="badge">初回体験</p><p class="price">¥2,000</p><p class="body-copy">まずは雰囲気を知りたい方へ</p></article>
    <article class="card" style="text-align:center"><p class="badge">単色</p><p class="price">¥5,000</p><p class="body-copy">ワンカラーで上品に</p></article>
    <article class="card" style="text-align:center"><p class="badge">複数色</p><p class="price">¥6,000</p><p class="body-copy">2色以上で華やかに</p></article>
  </div>

  <section class="price-photo-section">
    <p class="kicker">Photo Menu</p>
    <h2 class="section-title concept-title">写真で見るメニュー</h2>
    <div class="grid-3 photo-gallery">
      <article class="card photo-card compact">
        <div class="photo-frame"><img src="images/one-color.png" alt="ピンクのワンカラージェルネイル"></div>
        <div class="photo-copy"><p class="photo-label">ワンカラー</p><h3>単色ジェル</h3><p class="photo-price">¥5,000</p></div>
      </article>
      <article class="card photo-card compact">
        <div class="photo-frame"><img src="images/multi-color.png" alt="ブルーとグリーンの複数カラージェルネイル"></div>
        <div class="photo-copy"><p class="photo-label">複数カラー</p><h3>多色マグネット</h3><p class="photo-price">¥6,000</p></div>
      </article>
      <article class="card photo-card compact">
        <div class="photo-frame"><img class="rotate-180" src="images/pink-magnet.png" alt="ピンクマグネットネイル"></div>
        <div class="photo-copy"><p class="photo-label">マグネットネイル</p><h3>ピンクマグネット</h3><p class="photo-price">¥5,000</p></div>
      </article>
    </div>
  </section>
</main>
</body>
</html>
